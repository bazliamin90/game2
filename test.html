<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Doc PDF Viewer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #f8f8f8;
    font-family: Arial, sans-serif;
  }
  #canvasContainer {
    width: 100vw;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
  }
  canvas {
    display: block;
    margin: 10px 0;
    max-width: 95%;
    height: auto;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    border-radius: 4px;
  }
  #loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    font-size: 18px;
    color: #444;
  }
</style>
</head>
<body>

<div id="loading">Loading document…</div>
<div id="canvasContainer"></div>

<!-- PDF.js library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
<script>
const PUBLISHED_PDF_URL = "https://docs.google.com/document/d/e/2PACX-1vTS8ZEqU0NwcXhoX6YNUkejE-Kz5vC3WL9C9O4bvS1N6xSCSkbDBxHpiLe_yPWv2i9zX1vEH0i7Cs91/pub?output=pdf";

const container = document.getElementById('canvasContainer');
const loadingEl = document.getElementById('loading');

// Load PDF
pdfjsLib.getDocument(PUBLISHED_PDF_URL).promise.then(pdf => {
  const totalPages = pdf.numPages;
  
  // Loop through all pages
  for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
    pdf.getPage(pageNum).then(page => {
      const scale = 1.3;
      const viewport = page.getViewport({ scale });
      
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      
      container.appendChild(canvas);
      
      page.render({ canvasContext: ctx, viewport }).promise.then(() => {
        // Hide loading after last page renders
        if (pageNum === totalPages) {
          loadingEl.style.display = 'none';
        }
      });
    });
  }
}).catch(err => {
  loadingEl.textContent = "Failed to load document. Make sure it is published to web.";
  console.error(err);
});
</script>

</body>
</html>
