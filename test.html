<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDoc Publisher</title>

<style>
  :root {
    --bg: #f4f4f7;
    --card-bg: #ffffff;
    --text: #333;
    --shadow: rgba(0, 0, 0, 0.1);
    --radius: 14px;
  }

  body {
    margin: 10px;
    padding: 0;
    background: var(--bg);
    font-family: monospace;
    color: var(--text);
  }

  #doc-wrapper {
    max-width: 700px;
    padding: 20px;
    background: var(--card-bg);
    box-shadow: 0 6px 14px var(--shadow);
    border-radius: var(--radius);
    line-height: 1.6;
  }

  /* Google Doc content and all children */
  #doc-wrapper * {
    max-width: 100% !important;
    box-sizing: border-box;
  }

  /* Responsive images */
  #doc-wrapper img {
    display: inline-block !important;
    margin: 0 auto !important;
    height: auto !important;
    border-radius: 6px;
    max-width: 100% !important;
}

  /* Responsive tables */
  #doc-wrapper table {
    width: 100% !important;
    border-collapse: collapse;
  }

  #doc-wrapper table td, 
  #doc-wrapper table th {
    padding: 8px;
  }

  /* Optional typography improvements */
  #doc-wrapper h1 {
    margin-top: 0;
    font-size: 2rem;
  }
  #doc-wrapper h2 {
    font-size: 1.6rem;
  }
  #doc-wrapper h3 {
    font-size: 1.3rem;
  }

  /* Remove accidental overflow */
  #doc-wrapper {
    overflow-x: hidden;
  }
</style>

</head>
<body>

<div id="doc-wrapper">Loading document…</div>

<script>
(async () => {
  const url = "https://docs.google.com/document/d/e/2PACX-1vTS8ZEqU0NwcXhoX6YNUkejE-Kz5vC3WL9C9O4bvS1N6xSCSkbDBxHpiLe_yPWv2i9zX1vEH0i7Cs91/pub";

  try {
    const response = await fetch(url);
    let html = await response.text();

    // Remove Google script tags & unwanted elements
    html = html.replace(/<script[\s\S]*?<\/script>/gi, "");
    html = html.replace(/<style[\s\S]*?<\/style>/gi, ""); // remove Google styling
    html = html.replace(/<link[\s\S]*?>/gi, ""); // remove unnecessary CSS links

    // Insert content
    document.getElementById("doc-wrapper").innerHTML = html;

  } catch (err) {
    document.getElementById("doc-wrapper").innerHTML =
      "<p>Failed to load Google Doc.</p>";
    console.error(err);
  }
})();
</script>

</body>
</html>
