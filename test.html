<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDoc Publisher</title>

<style>
  :root {
    --bg: #f4f4f7;
    --card-bg: #ffffff;
    --text: #222;
    --shadow: rgba(0, 0, 0, 0.1);
    --radius: 14px;
  }

  body {
    margin: 0;
    padding: 20px;
    background: var(--bg);
    font-family: system-ui, sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
  }

  #doc-wrapper {
    max-width: 760px;
    width: 100%;
    padding: 25px 30px;
    background: var(--card-bg);
    box-shadow: 0 6px 14px var(--shadow);
    border-radius: var(--radius);
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* Force all Google content to behave */
  #doc-wrapper * {
    max-width: 100% !important;
    box-sizing: border-box;
  }

  /* Images fix */
  #doc-wrapper img {
    max-width: 100% !important;
    height: auto !important;
    display: block;
    margin: 12px auto;
    border-radius: 8px;
  }

  /* Tables */
  #doc-wrapper table {
    width: 100% !important;
    border-collapse: collapse !important;
  }
  #doc-wrapper td, 
  #doc-wrapper th {
    padding: 8px;
    border: 1px solid #ddd;
  }

  /* Headings */
  #doc-wrapper h1 { font-size: 2rem; margin-top: 0; }
  #doc-wrapper h2 { font-size: 1.6rem; }
  #doc-wrapper h3 { font-size: 1.3rem; }

</style>

</head>
<body>

<div id="doc-wrapper">Loading document…</div>

<script>
(async () => {
  const url = "https://docs.google.com/document/d/e/2PACX-1vTS8ZEqU0NwcXhoX6YNUkejE-Kz5vC3WL9C9O4bvS1N6xSCSkbDBxHpiLe_yPWv2i9zX1vEH0i7Cs91/pub";

  try {
    const response = await fetch(url);
    let html = await response.text();

    /* ❌ Remove Google’s injected scripts */
    html = html.replace(/<script[\s\S]*?<\/script>/gi, "");

    /* ❌ Remove Google style blocks */
    html = html.replace(/<style[\s\S]*?<\/style>/gi, "");

    /* ❌ Remove links (fonts, CSS, metadata) */
    html = html.replace(/<link[\s\S]*?>/gi, "");

    /* ❌ Remove footer containing:
          "Published using Google Docs"
          "Report abuse"
          "Learn more"
          "Updated automatically every 5 minutes"
    */
    html = html.replace(/<div[^>]*id="footer"[\s\S]*?<\/div>/gi, "");
    html = html.replace(/Published.*?(?=<\/)/gi, "");
    html = html.replace(/Report abuse/gi, "");
    html = html.replace(/Learn more/gi, "");
    html = html.replace(/Updated automatically[\s\S]*?<\//gi, "<");

    /* ❌ Remove empty weird containers */
    html = html.replace(/<div[^>]*goog[^>]*>[\s\S]*?<\/div>/gi, "");

    /* Insert cleaned doc */
    document.getElementById("doc-wrapper").innerHTML = html;

  } catch (err) {
    document.getElementById("doc-wrapper").innerHTML =
      "<p>Failed to load Google Doc.</p>";
    console.error(err);
  }
})();
</script>

</body>
</html>
