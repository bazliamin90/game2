<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Doc PDF Viewer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #f8f8f8;
      font-family: Arial, sans-serif;
    }

    .viewer-frame {
      width: 100vw;
      height: 100vh;
      border: none;
    }

    /* Optional loading message */
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: #444;
    }
  </style>
</head>
<body>

<div id="loading">Loading document…</div>

<iframe
  class="viewer-frame"
  id="docFrame"
  src=""
  onload="document.getElementById('loading').style.display='none';">
</iframe>

<script>
  // Replace with your own Google Doc file ID
  const FILE_ID = "1UYybWr-OtIK3uTcONGT35Gop6uphcQbE8uRAekUbkP0";

  // Construct the viewer URL
  const pdfUrl = `https://docs.google.com/document/d/${FILE_ID}/export?format=pdf`;
  const viewerUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true`;

  // Load into iframe
  document.getElementById("docFrame").src = viewerUrl;
</script>

</body>
</html>
