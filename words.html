<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Search Puzzle</title>

<style>
body {
  font-family: monospace;
  background: #f6f6f6;
  padding: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

h2 {
  text-align: center;
  z-index: 5;
}

.controls {
  margin-bottom: 20px;
  display: flex;
  gap: 10px;
}

#startBtn {
  padding: 6px 8px;
  background: #4caf50;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

#startBtn:hover { background: #43a047; }

#category {
  padding: 6px;
  font-size: 14px;
  border-radius: 6px;
}

/* Container */
.container {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  width: 100%;
  max-width: 900px;
  position: relative;
}

/* Blur lock */
.blurred {
  filter: blur(6px);
  pointer-events: none;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(15, min(40px, 6vw));
  grid-template-rows: repeat(15, min(40px, 6vw));
  gap: 2px;
  user-select: none;
  position: relative;
}

.cell {
  background: #fff;
  border: 1px solid #ccc;
  text-align: center;
  font-size: min(18px, 4vw);
  line-height: min(40px, 6vw);
  _font-weight: bold;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
}

.cell.selected {
  background: #c2ff26 !important;
}

.cell.highlight {
  background: #fbacff !important;
  animation: pop 0.4s ease forwards;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.4); }
  100% { transform: scale(1); }
}

/* Word list */
.word-list {
  min-width: 200px;
  font-size: 14px;
}

.word-list li.found {
  text-decoration: line-through;
  color: #4caf50;
  font-weight: bold;
}

/* Completion message overlay */
#completionMessage {
  font-size: 32px;
  font-weight: bold;
  color: #ff6f91;
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1000;
  background: rgba(255,255,255,0.95);
  padding: 20px 40px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  text-align: center;
}

/* Confetti */
.confetti-piece {
  position: fixed;
  width: 6px;
  height: 6px;
  background: #ffcb77;
  opacity: 0.8;
  pointer-events: none;
  z-index: 9999;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); }
  100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

/* Sparkle trail */
.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #fffd70;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.8;
  z-index: 1000;
  animation: sparkleAnim 0.8s ease forwards;
}

@keyframes sparkleAnim {
  0% { transform: scale(1) translateY(0); opacity: 1; }
  100% { transform: scale(0) translateY(-20px); opacity: 0; }
}

/* ------- MOBILE IMPROVEMENTS ------- */
@media (max-width: 600px) {
  h2 {
    font-size: 20px;
    margin-bottom: 10px;
    text-align: center;
  }

  .controls {
    width: 100%;
    display: flex;
    flex-direction: row;
    justify-content: center;
    gap: 6px;
    margin-bottom: 12px;
  }

  #category {
    font-size: 14px;
    padding: 5px;
  }

  .container {
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  /* GRID with bigger font size */
  .grid {
    grid-template-columns: repeat(15, min(26px, 5.3vw));
    grid-template-rows: repeat(15, min(26px, 5.3vw));
    gap: 1px;
  }

  .cell {
    font-size: 14px !important;       /* bigger font for mobile */
    line-height: min(26px, 5.3vw);
  }

  /* Word list properly centered */
  .word-list {
    width: 100%;
    text-align: center;                
    display: flex;
    flex-direction: column;
    align-items: center;               
  }

  .word-list ul {
    padding: 0;
    margin: 0 auto;
    text-align: center;
  }

  .word-list li {
    font-size: 12px;
    padding: 2px 0;
    margin: 2px 6px;
    display: inline-block;             
  }

  #completionMessage {
    font-size: 22px;
    padding: 12px 24px;
  }
}
</style>
</head>

<body>

<h2>Word Search Puzzle</h2>

<div class="controls">
  <!-- Dropdown will be populated automatically -->
  <select id="category">
    <option>Loading...</option>
  </select>

  <button id="startBtn">Start</button>
</div>

<div class="container blurred" id="puzzleContainer">
  <div id="puzzleGrid" class="grid"></div>

  <div class="word-list">
    <h3>Words</h3>
    <ul id="wordList"></ul>
  </div>
</div>

<div id="completionMessage">
  Fuyoo power ooo!<br><br>
  <button id="refreshBtn" style="
      padding: 8px 18px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;">
    Refresh Puzzle
  </button>
</div>

<script>
let size = 15;
let grid;
let placedWords = [];
let selection = [];
let lockedDirection = null;
let targetWord = null;
let currentCategory = "fruits";
let wordData;

/* -----------------------------
   LOAD JSON + POPULATE DROPDOWN
------------------------------ */

fetch("words.json")
  .then(res => res.json())
  .then(data => {
    wordData = data;
    const dropdown = document.getElementById("category");
    dropdown.innerHTML = "";

    const categories = Object.keys(wordData.categories);

    categories.forEach(cat => {
      const opt = document.createElement("option");
      opt.value = cat;
      opt.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
      dropdown.appendChild(opt);
    });

    dropdown.value = "fruits";
  });

document.getElementById("category").addEventListener("change", function () {
  currentCategory = this.value;
});

/* -----------------------------
   START PUZZLE
------------------------------ */

document.getElementById("startBtn").addEventListener("click", startPuzzle);

function startPuzzle() {
  currentCategory = document.getElementById("category").value || "fruits";

  document.getElementById("puzzleContainer").classList.remove("blurred");

  const words = wordData.categories[currentCategory].map(w => w.toUpperCase());
  newPuzzle(words);
}

/* -----------------------------
   REFRESH BUTTON LOGIC
------------------------------ */
document.getElementById("refreshBtn").addEventListener("click", () => {
  document.getElementById("completionMessage").style.display = "none";
  document.getElementById("puzzleContainer").classList.add("blurred");
  selection = [];
  lockedDirection = null;

  const words = wordData.categories[currentCategory].map(w => w.toUpperCase());
  newPuzzle(words);
  window.scrollTo({ top: 0, behavior: "smooth" });
});

/* -----------------------------
   PUZZLE GENERATION & LOGIC
------------------------------ */

function newPuzzle(words) {
  grid = Array.from({ length: size }, () => Array(size).fill(""));
  placedWords = [];
  selection = [];
  lockedDirection = null;

  const directions = [
    { r: 0, c: 1 }, { r: 1, c: 0 }, { r: 1, c: 1 }, { r: 1, c: -1 },
    { r: 0, c: -1 }, { r: -1, c: 0 }, { r: -1, c: -1 }, { r: -1, c: 1 }
  ];

  words.forEach(word => {
    let placed = false;
    while (!placed) {
      const dir = directions[Math.floor(Math.random() * directions.length)];
      const row = Math.floor(Math.random() * size);
      const col = Math.floor(Math.random() * size);

      let r = row, c = col, fits = true;
      for (let i = 0; i < word.length; i++) {
        if (r < 0 || r >= size || c < 0 || c >= size ||
            (grid[r][c] !== "" && grid[r][c] !== word[i])) {
          fits = false;
          break;
        }
        r += dir.r; c += dir.c;
      }
      if (!fits) continue;

      let coords = [];
      r = row; c = col;
      for (let i = 0; i < word.length; i++) {
        grid[r][c] = word[i];
        coords.push({ r, c });
        r += dir.r; c += dir.c;
      }
      placedWords.push({ word, coords });
      placed = true;
    }
  });

  const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  for (let r = 0; r < size; r++)
    for (let c = 0; c < size; c++)
      if (grid[r][c] === "")
        grid[r][c] = alphabet[Math.floor(Math.random() * alphabet.length)];

  renderPuzzle();
}

function renderPuzzle() {
  const gridDiv = document.getElementById("puzzleGrid");
  gridDiv.innerHTML = "";

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.textContent = grid[r][c];
      cell.dataset.row = r;
      cell.dataset.col = c;

      cell.addEventListener("click", () => handleCellClick(r, c, cell));

      gridDiv.appendChild(cell);
    }
  }

  renderWordList();
}

function renderWordList() {
  const ul = document.getElementById("wordList");
  ul.innerHTML = "";

  placedWords.forEach(w => {
    const li = document.createElement("li");
    li.textContent = w.word;
    li.id = "word-" + w.word;
    ul.appendChild(li);
  });
}

/* ---- CLICK SELECTION LOGIC ---- */

function handleCellClick(r, c, cell) {
  if (document.getElementById("puzzleContainer").classList.contains("blurred")) return;

  createSparkle(cell);

  if (selection.length === 0) {
    selection = [{ r, c }];
    cell.classList.add("selected");
    return;
  }

  if (selection.length === 1) {
    const dir = detectDirection(selection[0], {r, c});
    if (!dir) return resetSelection();
    lockedDirection = dir;

    if (!followsDirection(selection[0], {r, c}, dir)) return resetSelection();

    addSelection(r, c, cell);
    checkProgress();
    return;
  }

  if (!followsDirection(selection[0], {r, c}, lockedDirection))
    return resetSelection();

  addSelection(r, c, cell);
  checkProgress();
}

function createSparkle(cell) {
  const rect = cell.getBoundingClientRect();
  const sparkle = document.createElement("div");
  sparkle.className = "sparkle";
  sparkle.style.left = rect.left + rect.width/2 + "px";
  sparkle.style.top = rect.top + rect.height/2 + "px";
  document.body.appendChild(sparkle);
  setTimeout(() => sparkle.remove(), 800);
}

function detectDirection(a, b) {
  const dr = b.r - a.r;
  const dc = b.c - a.c;

  if(dr === 0 && dc > 0) return {r:0, c:1};
  if(dr === 0 && dc < 0) return {r:0, c:-1};
  if(dc === 0 && dr > 0) return {r:1, c:0};
  if(dc === 0 && dr < 0) return {r:-1, c:0};
  if(dr === dc && dr > 0) return {r:1, c:1};
  if(dr === dc && dr < 0) return {r:-1, c:-1};
  if(dr === -dc && dr > 0) return {r:1, c:-1};
  if(dr === -dc && dr < 0) return {r:-1, c:1};
  return null;
}

function followsDirection(start, current, dir) {
  const index = selection.length;
  return current.r === start.r + dir.r * index &&
         current.c === start.c + dir.c * index;
}

function addSelection(r, c, cell) {
  if (selection.some(s => s.r === r && s.c === c)) return;
  selection.push({ r, c });
  cell.classList.add("selected");
}

function resetSelection() {
  selection.forEach(s =>
    document.querySelector(`.cell[data-row="${s.r}"][data-col="${s.c}"]`)
      .classList.remove("selected")
  );
  selection = [];
  lockedDirection = null;
}

function coordsMatch(a, b) {
  if (a.length !== b.length) return false;
  return a.every((v,i)=>v.r===b[i].r && v.c===b[i].c);
}

function checkProgress() {
  for (let w of placedWords) {
    if (coordsMatch(selection, w.coords)) {
      return markWordFound(w);
    }
  }
}

function markWordFound(w) {
  w.coords.forEach(({ r, c }) => {
    document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`)
      .classList.add("highlight");
  });

  document.getElementById("word-" + w.word).classList.add("found");

  resetSelection();
  checkCompletion();
}

function checkCompletion() {
  if (placedWords.every(w =>
    document.getElementById("word-" + w.word).classList.contains("found")
  )) {
    document.getElementById("completionMessage").style.display = "block";
    launchConfetti();
  }
}

/* Confetti */
function launchConfetti() {
  for (let i = 0; i < 80; i++) {
    const confetti = document.createElement("div");
    confetti.className = "confetti-piece";
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.background = `hsl(${Math.random() * 360},70%,60%)`;
    confetti.style.animationDuration = (2 + Math.random() * 2) + "s";

    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 3000);
  }
}
</script>

</body>
</html>
