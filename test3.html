<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Doc Viewer</title>
<style>
  body {
    margin: 0;
    padding: 20px;
    background: #f9f9f9;
  }

  .doc-container {
    max-width: 800px;
    margin: auto;
    background: #fff;
    padding: 20px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    overflow-wrap: break-word;
  }

  .doc-container img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 10px 0;
  }

  /* Default fallback fonts if Google Doc font not loaded */
  .doc-container * {
    font-family: Arial, sans-serif;
  }
</style>
</head>
<body>

<h1>Google Doc Viewer</h1>
<div class="doc-container" id="docContent">Loading document...</div>

<script>
const docId = "1UYybWr-OtIK3uTcONGT35Gop6uphcQbE8uRAekUbkP0"; // <-- Replace with your Google Doc ID

async function loadGoogleDoc() {
  const url = `https://docs.google.com/document/d/${docId}/export?format=html`;

  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error("Failed to fetch document. Ensure it is 'Anyone with the link can view'.");

    const htmlText = await response.text();

    // Extract <body> content
    const bodyMatch = htmlText.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
    const bodyContent = bodyMatch ? bodyMatch[1] : "No content found";
    document.getElementById("docContent").innerHTML = bodyContent;

    // Extract <style> block to preserve Google Doc fonts/styles
    const styleMatch = htmlText.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
    if (styleMatch) {
      const styleTag = document.createElement("style");
      styleTag.innerHTML = styleMatch[1];
      document.head.appendChild(styleTag);
    }

    // Load Google Fonts used in the doc, if any
    const fontLinks = [...htmlText.matchAll(/<link[^>]+href="([^"]+fonts\.googleapis[^"]+)"/g)];
    fontLinks.forEach(linkMatch => {
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = linkMatch[1];
      document.head.appendChild(link);
    });

  } catch (err) {
    document.getElementById("docContent").innerHTML = "Error loading document: " + err.message;
  }
}

loadGoogleDoc();
</script>

</body>
</html>
