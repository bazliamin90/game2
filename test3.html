<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gdoc2html</title>

<style>
  body {
    background: #f5f5f5;
    padding: 10px 60px;
    display: flex;
    justify-content: center;
    font-family: monospace;
  }
  #container {
    max-width: 900px;
    margin: 0 10px;
  }
  /* Auto-scale images */
  #container img {
    max-width: 90% !important;
    height: auto !important;
    border-radius: 10px;
  }
  #container p {
    line-height: 1.4;
  }
</style>
</head>
<body>

<div id="container">Loading…</div>

<script>
(async () => {
  const docId = "1UYybWr-OtIK3uTcONGT35Gop6uphcQbE8uRAekUbkP0";
  const url = "https://script.google.com/macros/s/AKfycbzfFcDjp3YUlnCJ2S4VDgKx3yhTXPA1RhL-gtj97vXBNdMGlZ1QBKWEaKWFJ0vmqdhklw/exec?id=" + docId;

  const html = await fetch(url).then(r => r.text());
  document.getElementById("container").innerHTML = html;
})();
</script>

</body>
</html>
